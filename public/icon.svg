<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#4f46e5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#grad1)" />
  <g filter="url(#shadow)" transform="translate(64, 64)">
    <!-- Certificate background plate -->
    <rect x="48" y="32" width="288" height="320" rx="24" fill="#ffffff" />
    <!-- Certificate gold border pattern -->
    <rect x="64" y="48" width="256" height="288" rx="12" fill="none" stroke="#fbbf24" stroke-width="6" />
    <!-- Text Lines -->
    <line x1="96" y1="96" x2="288" y2="96" stroke="#1e293b" stroke-width="12" stroke-linecap="round" />
    <line x1="96" y1="144" x2="240" y2="144" stroke="#64748b" stroke-width="8" stroke-linecap="round" />
    <line x1="96" y1="184" x2="288" y2="184" stroke="#e2e8f0" stroke-width="8" stroke-linecap="round" />
    <line x1="96" y1="216" x2="256" y2="216" stroke="#e2e8f0" stroke-width="8" stroke-linecap="round" />
    <!-- Gold Stamp Medal ribbon -->
    <path d="M216 260 L232 320 L216 305 L200 320 Z" fill="#f59e0b" stroke="#d97706" stroke-width="2" />
    <path d="M248 260 L264 320 L248 305 L232 320 Z" fill="#f59e0b" stroke="#d97706" stroke-width="2" />
    <circle cx="232" cy="256" r="28" fill="#fbbf24" stroke="#f59e0b" stroke-width="3" />
    <!-- Ribbon lines inside seal -->
    <circle cx="232" cy="256" r="16" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="4,2" />
    <!-- Signature lines -->
    <path d="M96 288 Q112 260 136 288 T176 288" fill="none" stroke="#4f46e5" stroke-width="3" stroke-linecap="round" />
    <line x1="96" y1="296" x2="176" y2="296" stroke="#94a3b8" stroke-width="2" />
  </g>
</svg>
